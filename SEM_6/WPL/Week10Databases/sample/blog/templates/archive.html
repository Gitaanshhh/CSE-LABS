<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
</head>
<body>

<h1>Create Blog Post</h1>

<form action="{% url 'create_blogpost' %}" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit</button>
</form>

<hr>

<h1>Recent Posts</h1>

{% for post in posts %}
    <h2>{{ post.title }}</h2>
    <p><strong>{{ post.timestamp }}</strong></p>
    <p>{{ post.body }}</p>
    <hr>
{% empty %}
    <p>No posts yet.</p>
{% endfor %}

</body>
</html>
