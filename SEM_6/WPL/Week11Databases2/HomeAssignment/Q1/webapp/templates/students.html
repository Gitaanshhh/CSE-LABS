<!DOCTYPE html>
<html>
<head>
    <title>Student Entry</title>
</head>
<body>

<h2>Add Student</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit</button>
</form>

<hr>

<h2>All Students</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Course</th>
        <th>DOB</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.student_id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.course }}</td>
        <td>{{ student.dob }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No students yet</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
