<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Add Book</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

</form>

<a href="/add-author/" class="btn btn-info">Add Author</a>
<a href="/add-publisher/" class="btn btn-warning">Add Publisher</a>

<a href="/" class="btn btn-secondary mt-2">View Books</a>

</body>
</html>
